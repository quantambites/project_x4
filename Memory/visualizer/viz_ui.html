<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>robot_memory — world visualizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Syne:wght@700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b0f;
  --panel:#0c1118;
  --panel2:#0f1520;
  --border:#1a2535;
  --border2:#243040;
  --acc:#00d4ff;
  --acc2:#ff6b35;
  --acc3:#39ff7a;
  --acc4:#aa88ff;
  --warn:#ffcc00;
  --muted:#2a3a4a;
  --text:#b8ccd8;
  --textdim:#4a6070;
  --red:#ff4455;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#070b0f}
::-webkit-scrollbar-thumb{background:#1a2535;border-radius:2px}

/* ── Layout ── */
#app{display:grid;grid-template-rows:48px 1fr;height:100vh}
#header{
  display:flex;align-items:center;gap:16px;
  padding:0 16px;
  border-bottom:1px solid var(--border);
  background:var(--panel);
}
#header h1{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--acc);letter-spacing:.03em}
#header .sub{color:var(--textdim);font-size:9px;letter-spacing:.12em}
#header .dot{width:7px;height:7px;border-radius:50%;background:var(--acc3);box-shadow:0 0 8px var(--acc3);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#header .conn-status{margin-left:auto;font-size:9px;padding:3px 10px;border-radius:3px;border:1px solid}
#header .conn-status.ok{color:var(--acc3);border-color:var(--acc3)44;background:var(--acc3)11}
#header .conn-status.err{color:var(--red);border-color:var(--red)44;background:var(--red)11}
#header .counts{display:flex;gap:12px}
#header .count-item{display:flex;flex-direction:column;align-items:center;gap:1px}
#header .count-item .n{font-size:14px;font-weight:700;line-height:1}
#header .count-item .l{font-size:7px;color:var(--textdim);letter-spacing:.1em}
#header .refresh-btn{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  background:var(--acc)11;color:var(--acc);border:1px solid var(--acc)44;
  border-radius:4px;padding:4px 10px;cursor:pointer;transition:.15s;
}
#header .refresh-btn:hover{background:var(--acc)22}

#body{display:grid;grid-template-columns:1fr 1fr 320px;height:100%;overflow:hidden}

/* ── Panels ── */
.panel{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-title{
  padding:7px 12px;border-bottom:1px solid var(--border);
  font-size:9px;letter-spacing:.14em;color:var(--acc);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  background:var(--panel2);
}
.panel-title::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--acc);display:inline-block}
.panel-content{flex:1;overflow:auto;position:relative}

/* ── Map canvas ── */
#map-wrap{position:relative;width:100%;height:100%}
canvas{display:block}
#map-canvas{position:absolute;inset:0;width:100%!important;height:100%!important}

/* ── Floor tabs ── */
#floor-tabs{
  display:flex;gap:0;padding:6px 10px 0;border-bottom:1px solid var(--border);
  background:var(--panel2);flex-shrink:0;
}
.ftab{
  font-size:8px;letter-spacing:.1em;color:var(--textdim);
  padding:4px 12px;cursor:pointer;border-bottom:2px solid transparent;
  transition:.15s;background:transparent;border-top:none;border-left:none;border-right:none;
  font-family:'JetBrains Mono',monospace;
}
.ftab.active{color:var(--acc);border-bottom-color:var(--acc)}
#floor-info{font-size:8px;color:var(--textdim);padding:4px 10px;flex-shrink:0}

/* ── Right sidebar tabs ── */
#right-panel{display:flex;flex-direction:column;overflow:hidden;border-right:none}
#sidebar-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel2);flex-shrink:0}
.stab{
  flex:1;font-size:8px;letter-spacing:.08em;color:var(--textdim);
  padding:7px 4px;cursor:pointer;border-bottom:2px solid transparent;
  text-align:center;transition:.15s;
  background:transparent;border-top:none;border-left:none;border-right:none;
  font-family:'JetBrains Mono',monospace;
}
.stab.active{color:var(--acc);border-bottom-color:var(--acc)}
#sidebar-content{flex:1;overflow:auto;padding:10px}

/* ── Entity cards ── */
.entity-card{
  border:1px solid var(--border);border-radius:5px;padding:8px 10px;
  margin-bottom:6px;cursor:pointer;transition:.15s;
}
.entity-card:hover{border-color:var(--border2);background:var(--panel2)}
.entity-card.selected{border-color:var(--acc)88;background:var(--acc)08}
.entity-name{font-size:11px;font-weight:700;margin-bottom:3px}
.entity-meta{font-size:9px;color:var(--textdim);display:flex;gap:10px;flex-wrap:wrap}
.tag{
  display:inline-block;padding:1px 6px;border-radius:3px;
  font-size:8px;letter-spacing:.06em;margin:1px;
  background:var(--acc)15;color:var(--acc);border:1px solid var(--acc)30;
}

/* ── Raw nodes feed ── */
.raw-card{border-radius:4px;padding:6px 8px;margin-bottom:5px;border-left:3px solid}
.raw-card .raw-type{font-size:8px;letter-spacing:.1em;margin-bottom:2px}
.raw-card .raw-text{font-size:9px;color:var(--text);line-height:1.5;word-break:break-word}
.raw-card .raw-meta{font-size:8px;color:var(--textdim);margin-top:3px}

/* ── Detail panel ── */
.detail-section{margin-bottom:12px}
.detail-label{font-size:8px;color:var(--textdim);letter-spacing:.12em;margin-bottom:5px}
.detail-value{font-size:10px;color:var(--text);line-height:1.6}
.edge-row{
  display:flex;align-items:center;gap:6px;margin-bottom:4px;
  padding:4px 6px;border-radius:3px;background:var(--panel2);
}
.edge-rel{font-size:8px;padding:1px 6px;border-radius:2px}
.edge-name{font-size:9px;color:var(--textdim)}
.edge-target{font-size:9px;color:var(--text)}

/* ── Consolidation log ── */
.clog-card{
  border:1px solid var(--border);border-radius:4px;padding:7px 9px;margin-bottom:5px;
}
.clog-status-done{color:var(--acc3)}
.clog-status-failed{color:var(--red)}
.clog-status-running{color:var(--warn)}

/* ── Info panel ── */
.info-card{
  border:1px solid var(--border);border-radius:4px;padding:7px 9px;margin-bottom:5px;
}
.info-full{font-size:9px;color:var(--text);line-height:1.6;margin-top:5px;white-space:pre-wrap;word-break:break-word}

/* ── Tooltip ── */
#tooltip{
  position:fixed;pointer-events:none;z-index:999;
  background:var(--panel);border:1px solid var(--border2);
  border-radius:5px;padding:8px 12px;font-size:10px;
  max-width:240px;line-height:1.6;box-shadow:0 4px 20px #00000066;
  display:none;
}
#tooltip .tt-name{font-weight:700;margin-bottom:3px}
#tooltip .tt-dim{font-size:8px;color:var(--textdim)}

/* ── Empty state ── */
.empty{color:var(--textdim);font-size:10px;padding:20px;text-align:center;line-height:2}

/* ── Legend ── */
#legend{
  display:flex;flex-wrap:wrap;gap:8px;padding:6px 10px;
  border-top:1px solid var(--border);background:var(--panel2);flex-shrink:0;
  font-size:8px;color:var(--textdim);
}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg-sq{width:7px;height:7px;border-radius:1px;flex-shrink:0}

/* ── Graph SVG ── */
#graph-svg{width:100%;height:100%;display:block}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div class="dot"></div>
    <h1>ROBOT MEMORY</h1>
    <span class="sub">WORLD VISUALIZER · LIVE POSTGRES</span>
    <div class="counts" id="hdr-counts"></div>
    <button class="refresh-btn" onclick="fetchAll()">⟳ REFRESH</button>
    <span id="conn-status" class="conn-status err">CONNECTING…</span>
  </div>

  <!-- Body -->
  <div id="body">

    <!-- Left: Location Map -->
    <div class="panel" id="map-panel">
      <div class="panel-title">LOCATION MAP  —  SPATIAL 3D</div>
      <div id="floor-tabs"></div>
      <div id="floor-info"></div>
      <div class="panel-content" id="map-wrap">
        <canvas id="map-canvas"></canvas>
      </div>
      <div id="legend"></div>
    </div>

    <!-- Centre: Entity Graph -->
    <div class="panel" id="graph-panel">
      <div class="panel-title">ENTITY KNOWLEDGE GRAPH</div>
      <div class="panel-content">
        <svg id="graph-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>

    <!-- Right: Sidebar -->
    <div class="panel" id="right-panel">
      <div id="sidebar-tabs">
        <button class="stab active" onclick="switchTab('entities')">ENTITIES</button>
        <button class="stab" onclick="switchTab('raw')">RAW</button>
        <button class="stab" onclick="switchTab('detail')">DETAIL</button>
        <button class="stab" onclick="switchTab('log')">LOG</button>
      </div>
      <div id="sidebar-content"></div>
    </div>

  </div>
</div>
<div id="tooltip"></div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const API = (window.location.port === '' || window.location.port === '80' || window.location.port === '443')
  ? window.location.origin
  : `${window.location.protocol}//${window.location.hostname}:8765`;

const POLL_MS = 4000; // auto-refresh every 4 seconds

// ── State ────────────────────────────────────────────────────────────────────
let STATE = {
  entities: [], edges: [], path_nodes: [], runtime_path: [],
  raw_nodes: [], interactions: [], bounds: {min_x:-1,max_x:12,min_y:-1,max_y:12,min_floor:0,max_floor:1},
  counts: {}, consolidation_log: [],
  selected_entity: null,
  active_floor: 0,
  active_tab: 'entities',
  info_nodes_cache: {},  // entity_id -> [info_nodes]
  connected: false,
};

// ── Type colors ───────────────────────────────────────────────────────────────
const TYPE_COLOR = {
  place:'#00d4ff', object:'#ff6b35', vehicle:'#ffcc00',
  sensor:'#39ff7a', person:'#ff69b4', concept:'#aa88ff',
};
const RAW_COLOR = {
  audio_transcript:'#ff6b35', video_frame:'#39ff7a',
  text_command:'#00d4ff', observation:'#ffcc00',
  sensor_reading:'#aa88ff', conversation:'#ff69b4',
  image_description:'#00ffcc',
};
const REL_COLOR = {
  monitored_by:'#39ff7a', adjacent_to:'#00d4ff', services:'#ffcc00',
  charges:'#ff6b35', connects:'#aa88ff', near:'#4a6070',
  related_to:'#4a6070', contains:'#ff69b4',
};

function typeColor(t){ return TYPE_COLOR[t] || '#8899aa' }
function rawColor(t) { return RAW_COLOR[t]  || '#8899aa' }
function relColor(t) { return REL_COLOR[t]  || '#4a6070' }

// ── API fetch ────────────────────────────────────────────────────────────────
async function fetchAll() {
  try {
    const r = await fetch(`${API}/api/snapshot`);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    STATE.entities     = data.entities     || [];
    STATE.edges        = data.edges        || [];
    STATE.path_nodes   = data.path_nodes   || [];
    STATE.runtime_path = data.runtime_path || [];
    STATE.raw_nodes    = data.raw_nodes    || [];
    STATE.interactions = data.interactions || [];
    STATE.bounds       = data.bounds       || STATE.bounds;
    STATE.counts       = data.counts       || {};
    STATE.consolidation_log = data.consolidation_log || [];
    STATE.connected    = true;

    // Auto-set floor range from data
    const floors = [...new Set([
      ...STATE.entities.map(e=>e.floor_level||0),
      ...STATE.path_nodes.map(p=>p.floor_level||0),
    ])].sort((a,b)=>a-b);
    STATE.floors = floors.length ? floors : [0];
    if (!STATE.floors.includes(STATE.active_floor)) STATE.active_floor = STATE.floors[0];

    renderAll();
    setConnStatus(true);
  } catch(e) {
    STATE.connected = false;
    setConnStatus(false, e.message);
    console.error('fetch failed:', e);
  }
}

function setConnStatus(ok, msg='') {
  const el = document.getElementById('conn-status');
  el.className = 'conn-status ' + (ok ? 'ok' : 'err');
  el.textContent = ok ? '● LIVE  ' + new Date().toLocaleTimeString() : '✗ DB ERROR: ' + msg;
}

// ── Header counts ─────────────────────────────────────────────────────────────
function renderHeader() {
  const c = STATE.counts;
  const items = [
    ['ENTITIES', c.entity_nodes || 0, 'var(--acc)'],
    ['EDGES',    c.relationship_edges || 0, 'var(--acc2)'],
    ['PATH PTS', c.path_nodes || 0, 'var(--acc3)'],
    ['RAW',      c.raw_temporal_nodes || 0, 'var(--warn)'],
    ['RUNTIME',  c.temporal_path_log || 0, 'var(--acc4)'],
    ['CONSOLS',  c.consolidation_log || 0, '#8899aa'],
  ];
  document.getElementById('hdr-counts').innerHTML = items.map(([l,n,col])=>
    `<div class="count-item">
      <span class="n" style="color:${col}">${n}</span>
      <span class="l">${l}</span>
    </div>`
  ).join('');
}

// ── Floor tabs ────────────────────────────────────────────────────────────────
function renderFloorTabs() {
  const floors = STATE.floors || [0];
  document.getElementById('floor-tabs').innerHTML = floors.map(f =>
    `<button class="ftab ${f===STATE.active_floor?'active':''}" onclick="setFloor(${f})">FLOOR ${f}</button>`
  ).join('');
  const onFloor = STATE.entities.filter(e=>(e.floor_level||0)===STATE.active_floor).length;
  const pathOnFloor = STATE.path_nodes.filter(p=>(p.floor_level||0)===STATE.active_floor).length;
  const rawOnFloor  = STATE.raw_nodes.filter(r=>(r.floor_level||0)===STATE.active_floor).length;
  document.getElementById('floor-info').innerHTML =
    `<span style="color:var(--acc)">${onFloor} entities</span> &nbsp;·&nbsp; `+
    `<span style="color:var(--acc3)">${pathOnFloor} path pts</span> &nbsp;·&nbsp; `+
    `<span style="color:var(--warn)">${rawOnFloor} raw nodes</span>`;
}

function setFloor(f) {
  STATE.active_floor = f;
  renderFloorTabs();
  drawMap();
}

// ── Legend ────────────────────────────────────────────────────────────────────
function renderLegend() {
  const types = [...new Set(STATE.entities.map(e=>e.entity_type).filter(Boolean))];
  const rawTypes = [...new Set(STATE.raw_nodes.map(r=>r.data_type).filter(Boolean))];
  let html = types.map(t =>
    `<span class="leg-item"><span class="leg-dot" style="background:${typeColor(t)}"></span>${t}</span>`
  ).join('');
  html += rawTypes.map(t =>
    `<span class="leg-item"><span class="leg-sq" style="background:${rawColor(t)}"></span>${t.replace('_',' ')}</span>`
  ).join('');
  html += `<span class="leg-item"><span style="color:var(--acc3)">──</span>&nbsp;path</span>`;
  html += `<span class="leg-item"><span style="color:var(--acc)44">- -</span>&nbsp;runtime</span>`;
  document.getElementById('legend').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────────────────
// MAP CANVAS
// ─────────────────────────────────────────────────────────────────────────────
let mapAnimFrame = null;

function worldToCanvas(x, y, W, H, bounds, pad=42) {
  const rx = bounds.max_x - bounds.min_x || 1;
  const ry = bounds.max_y - bounds.min_y || 1;
  const scale = Math.min((W-2*pad)/rx, (H-2*pad)/ry);
  const offX  = pad + ((W-2*pad) - rx*scale)/2;
  const offY  = pad + ((H-2*pad) - ry*scale)/2;
  const cx = offX + (x - bounds.min_x) * scale;
  const cy = offY + (bounds.max_y - y) * scale;
  return [cx, cy, scale];
}

function drawMap() {
  const canvas = document.getElementById('map-canvas');
  const wrap   = document.getElementById('map-wrap');
  if (!canvas || !wrap) return;

  // Resize to container
  const W = wrap.clientWidth  || 600;
  const H = wrap.clientHeight || 600;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const bounds = STATE.bounds;
  const floor  = STATE.active_floor;
  const sel    = STATE.selected_entity;

  // Background gradient
  const bgGrad = ctx.createLinearGradient(0,0,W,H);
  bgGrad.addColorStop(0, floor===0 ? '#07120a' : '#070b14');
  bgGrad.addColorStop(1, floor===0 ? '#0a0f0c' : '#0a0c15');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0,W,H);

  // Grid
  const [,, scale] = worldToCanvas(0,0,W,H,bounds);
  ctx.strokeStyle = '#1a253544';
  ctx.lineWidth = 0.5;
  for (let gx = Math.ceil(bounds.min_x); gx <= Math.floor(bounds.max_x)+1; gx++) {
    const [px] = worldToCanvas(gx, 0, W, H, bounds);
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,H); ctx.stroke();
  }
  for (let gy = Math.ceil(bounds.min_y); gy <= Math.floor(bounds.max_y)+1; gy++) {
    const [,py] = worldToCanvas(0, gy, W, H, bounds);
    ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke();
  }

  // Axis labels
  ctx.fillStyle = '#2a3a4a';
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  for (let gx = Math.ceil(bounds.min_x); gx <= Math.floor(bounds.max_x); gx+=2) {
    const [px] = worldToCanvas(gx, bounds.min_y, W, H, bounds);
    ctx.fillText(gx+'m', px, H-8);
  }
  ctx.textAlign = 'right';
  for (let gy = Math.ceil(bounds.min_y); gy <= Math.floor(bounds.max_y); gy+=2) {
    const [,py] = worldToCanvas(bounds.min_x, gy, W, H, bounds);
    ctx.fillText(gy+'m', 30, py+4);
  }

  // ── Committed path (global) ───────────────────────────────────────────────
  const floorPathNodes = STATE.path_nodes.filter(p=>(p.floor_level||0)===floor);
  if (floorPathNodes.length > 1) {
    ctx.strokeStyle = '#39ff7a55';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    floorPathNodes.forEach((p,i) => {
      const [cx,cy] = worldToCanvas(p.x||0, p.y||0, W, H, bounds);
      if(i===0) ctx.moveTo(cx,cy); else ctx.lineTo(cx,cy);
    });
    ctx.stroke();
    // Visit-count dots — larger = visited more
    floorPathNodes.forEach(p => {
      const [cx,cy] = worldToCanvas(p.x||0, p.y||0, W, H, bounds);
      const r = Math.min(1.5 + (p.visit_count||1)*0.4, 5);
      ctx.fillStyle = '#39ff7a44';
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    });
  }

  // ── Runtime path (temporal_path_log, latest session) ─────────────────────
  const rtFloor = STATE.runtime_path.filter(p=>(p.floor_level||0)===floor);
  if (rtFloor.length > 1) {
    ctx.strokeStyle = '#00d4ff33';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,4]);
    ctx.beginPath();
    rtFloor.forEach((p,i) => {
      const [cx,cy] = worldToCanvas(p.x||0, p.y||0, W, H, bounds);
      if(i===0) ctx.moveTo(cx,cy); else ctx.lineTo(cx,cy);
    });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Raw temporal nodes ────────────────────────────────────────────────────
  STATE.raw_nodes.filter(r=>(r.floor_level||0)===floor && r.x!=null).forEach(raw => {
    const [cx,cy] = worldToCanvas(raw.x, raw.y||0, W, H, bounds);
    const col = rawColor(raw.data_type);
    ctx.globalAlpha = raw.processed ? 0.2 : 0.75;
    ctx.strokeStyle = col;
    ctx.lineWidth   = 1.2;
    const sz = 7;
    // Diamond shape for raw nodes
    ctx.beginPath();
    ctx.moveTo(cx, cy-sz); ctx.lineTo(cx+sz, cy);
    ctx.lineTo(cx, cy+sz); ctx.lineTo(cx-sz, cy);
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle = col+'18';
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // ── Temporal interactions ─────────────────────────────────────────────────
  STATE.interactions.filter(i=>(i.floor_level||0)===floor && i.x!=null).forEach(intr => {
    const [cx,cy] = worldToCanvas(intr.x, intr.y||0, W, H, bounds);
    ctx.fillStyle = '#ffcc0022';
    ctx.strokeStyle = '#ffcc0055';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill(); ctx.stroke();
  });

  // ── Entity nodes ──────────────────────────────────────────────────────────
  const floorEntities = STATE.entities.filter(e=>(e.floor_level||0)===floor);
  // Draw edges first (only between visible entities)
  const visIds = new Set(floorEntities.map(e=>e.node_id));
  STATE.edges.forEach(ed => {
    if (!visIds.has(ed.node_id_1) || !visIds.has(ed.node_id_2)) return;
    const e1 = floorEntities.find(e=>e.node_id===ed.node_id_1);
    const e2 = floorEntities.find(e=>e.node_id===ed.node_id_2);
    if (!e1||!e2) return;
    const [x1,y1] = worldToCanvas(e1.x||0, e1.y||0, W, H, bounds);
    const [x2,y2] = worldToCanvas(e2.x||0, e2.y||0, W, H, bounds);
    const col = relColor(ed.rel_type);
    ctx.strokeStyle = col+'55';
    ctx.lineWidth   = Math.max(0.5, ed.weight*0.8);
    ctx.setLineDash(ed.directed ? [4,3] : []);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.setLineDash([]);
  });

  // Draw entities
  floorEntities.forEach(ent => {
    const [cx,cy] = worldToCanvas(ent.x||0, ent.y||0, W, H, bounds);
    const col = typeColor(ent.entity_type);
    const isSel = sel && sel.node_id===ent.node_id;
    const r = Math.max(8, Math.min(scale*0.3, 14)) + (ent.weight||1)*1.5;

    if (isSel) { ctx.shadowColor=col; ctx.shadowBlur=20; }

    // Outer glow ring for selected
    if (isSel) {
      ctx.strokeStyle = col+'66';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(cx,cy,r+5,0,Math.PI*2); ctx.stroke();
    }

    // Fill
    ctx.fillStyle = col+'22';
    ctx.strokeStyle = col + (isSel?'ff':'99');
    ctx.lineWidth = isSel ? 2 : 1.5;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    // Facing arrow
    if (ent.facing_deg != null) {
      const rad = (ent.facing_deg - 90) * Math.PI/180;
      ctx.strokeStyle = col+'88';
      ctx.lineWidth = 1.5;
      const al = r+9;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(rad)*al, cy+Math.sin(rad)*al);
      ctx.stroke();
      // Arrowhead
      const aw = 4;
      const ax = cx+Math.cos(rad)*al, ay = cy+Math.sin(rad)*al;
      ctx.fillStyle = col+'99';
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax+Math.cos(rad+2.5)*aw, ay+Math.sin(rad+2.5)*aw);
      ctx.lineTo(ax+Math.cos(rad-2.5)*aw, ay+Math.sin(rad-2.5)*aw);
      ctx.closePath(); ctx.fill();
    }

    // Bbox outline
    if (ent.bbox_dx && scale > 8) {
      const bw = ent.bbox_dx * scale * 2;
      const bh = ent.bbox_dy * scale * 2;
      ctx.strokeStyle = col+'33';
      ctx.lineWidth = 0.8;
      ctx.setLineDash([2,3]);
      ctx.strokeRect(cx-bw/2, cy-bh/2, bw, bh);
      ctx.setLineDash([]);
    }

    // Label
    ctx.fillStyle = isSel ? col : col+'cc';
    ctx.font = `${isSel?'bold ':''}${Math.max(8, Math.min(10, scale*0.4))}px JetBrains Mono,monospace`;
    ctx.textAlign = 'center';
    // Background pill for readability
    const label = ent.name;
    const lw = ctx.measureText(label).width;
    ctx.fillStyle = '#070b0fee';
    ctx.fillRect(cx-lw/2-2, cy-r-14, lw+4, 12);
    ctx.fillStyle = isSel ? col : col+'cc';
    ctx.fillText(label, cx, cy-r-4);

    // Info count badge
    if (ent.info_count > 0) {
      ctx.fillStyle = '#00d4ff';
      ctx.font = '7px JetBrains Mono,monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`ℹ${ent.info_count}`, cx+r+2, cy-r+4);
    }
  });

  // ── Robot marker (last runtime position on this floor) ───────────────────
  const rtLast = [...rtFloor].reverse()[0];
  if (rtLast) {
    const [rx,ry] = worldToCanvas(rtLast.x||0, rtLast.y||0, W, H, bounds);
    ctx.shadowColor='#39ff7a'; ctx.shadowBlur=16;
    ctx.fillStyle='#ffffff';
    ctx.strokeStyle='#39ff7a';
    ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(rx,ry,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    // Label
    ctx.fillStyle='#39ff7a';
    ctx.font='bold 8px JetBrains Mono,monospace';
    ctx.textAlign='center';
    ctx.fillText('ROBOT', rx, ry-12);
    // Heading arrow
    if (rtLast.heading_deg != null) {
      const rad = (rtLast.heading_deg-90)*Math.PI/180;
      ctx.strokeStyle='#39ff7a';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(rx,ry);
      ctx.lineTo(rx+Math.cos(rad)*14, ry+Math.sin(rad)*14);
      ctx.stroke();
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ENTITY KNOWLEDGE GRAPH (SVG)
// ─────────────────────────────────────────────────────────────────────────────
let graphLayout = {};  // node_id -> {x,y}

function layoutGraph() {
  // Force-directed layout: simple spring simulation
  const nodes = STATE.entities;
  const edges = STATE.edges;
  const svg   = document.getElementById('graph-svg');
  const W     = svg.clientWidth  || 500;
  const H     = svg.clientHeight || 500;
  const pad   = 60;

  // Initialize positions if new
  nodes.forEach(n => {
    if (!graphLayout[n.node_id]) {
      graphLayout[n.node_id] = {
        x: pad + Math.random()*(W-2*pad),
        y: pad + Math.random()*(H-2*pad),
        vx:0, vy:0,
      };
    }
  });

  // Remove old nodes
  Object.keys(graphLayout).forEach(id => {
    if (!nodes.find(n=>n.node_id===id)) delete graphLayout[id];
  });

  // Run simulation steps
  const k  = Math.sqrt((W*H)/Math.max(nodes.length,1)) * 0.7;
  const steps = 80;
  for (let s=0; s<steps; s++) {
    const force = {};
    nodes.forEach(n=>{force[n.node_id]={x:0,y:0}});

    // Repulsion
    for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
      const a=nodes[i], b=nodes[j];
      const pa=graphLayout[a.node_id], pb=graphLayout[b.node_id];
      const dx=pa.x-pb.x, dy=pa.y-pb.y;
      const d=Math.max(Math.hypot(dx,dy),1);
      const f=k*k/d;
      const fx=dx/d*f, fy=dy/d*f;
      force[a.node_id].x+=fx; force[a.node_id].y+=fy;
      force[b.node_id].x-=fx; force[b.node_id].y-=fy;
    }

    // Attraction (edges)
    edges.forEach(ed => {
      const pa=graphLayout[ed.node_id_1], pb=graphLayout[ed.node_id_2];
      if(!pa||!pb) return;
      const dx=pb.x-pa.x, dy=pb.y-pa.y;
      const d=Math.max(Math.hypot(dx,dy),1);
      const f=d*d/k * 0.8;
      const fx=dx/d*f, fy=dy/d*f;
      force[ed.node_id_1].x+=fx; force[ed.node_id_1].y+=fy;
      force[ed.node_id_2].x-=fx; force[ed.node_id_2].y-=fy;
    });

    // Apply
    const temp = 15 * (1 - s/steps);
    nodes.forEach(n => {
      const p=graphLayout[n.node_id], f=force[n.node_id];
      const d=Math.max(Math.hypot(f.x,f.y),1);
      p.x += f.x/d * Math.min(d,temp);
      p.y += f.y/d * Math.min(d,temp);
      p.x = Math.max(pad, Math.min(W-pad, p.x));
      p.y = Math.max(pad, Math.min(H-pad, p.y));
    });
  }
}

function drawGraph() {
  const svg  = document.getElementById('graph-svg');
  const W    = svg.clientWidth  || 500;
  const H    = svg.clientHeight || 500;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML = '';

  // Background
  const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('width',W); bg.setAttribute('height',H); bg.setAttribute('fill','#070b0f');
  svg.appendChild(bg);

  // Defs (arrowheads)
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  [...new Set(STATE.edges.map(e=>e.rel_type))].forEach(rt => {
    const col = relColor(rt);
    const mk = document.createElementNS('http://www.w3.org/2000/svg','marker');
    mk.setAttribute('id',`arrow-${rt.replace(/[^a-z0-9]/gi,'_')}`);
    mk.setAttribute('viewBox','0 0 10 10'); mk.setAttribute('refX','9'); mk.setAttribute('refY','5');
    mk.setAttribute('markerWidth','6'); mk.setAttribute('markerHeight','6');
    mk.setAttribute('orient','auto-start-reverse');
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M 0 0 L 10 5 L 0 10 z');
    path.setAttribute('fill',col+'99');
    mk.appendChild(path); defs.appendChild(mk);
  });
  svg.appendChild(defs);

  const sel = STATE.selected_entity;

  // Edges
  STATE.edges.forEach(ed => {
    const pa=graphLayout[ed.node_id_1], pb=graphLayout[ed.node_id_2];
    if(!pa||!pb) return;
    const col = relColor(ed.rel_type);
    // Bezier
    const mx=(pa.x+pb.x)/2+(pb.y-pa.y)*0.12;
    const my=(pa.y+pb.y)/2-(pb.x-pa.x)*0.12;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${pa.x},${pa.y} Q${mx},${my} ${pb.x},${pb.y}`);
    path.setAttribute('stroke',col+'77');
    path.setAttribute('stroke-width', Math.max(0.8, ed.weight*1.2));
    path.setAttribute('fill','none');
    if(ed.directed) path.setAttribute('marker-end',`url(#arrow-${ed.rel_type.replace(/[^a-z0-9]/gi,'_')})`);
    svg.appendChild(path);
    // Edge label at midpoint
    const lx=(pa.x+pb.x)/2+(pb.y-pa.y)*0.06;
    const ly=(pa.y+pb.y)/2-(pb.x-pa.x)*0.06;
    const ltxt=document.createElementNS('http://www.w3.org/2000/svg','text');
    ltxt.setAttribute('x',lx); ltxt.setAttribute('y',ly);
    ltxt.setAttribute('fill',col+'99');
    ltxt.setAttribute('font-size','7');
    ltxt.setAttribute('font-family','JetBrains Mono,monospace');
    ltxt.setAttribute('text-anchor','middle');
    ltxt.textContent=ed.rel_type;
    svg.appendChild(ltxt);
  });

  // Nodes
  STATE.entities.forEach(ent => {
    const p=graphLayout[ent.node_id];
    if(!p) return;
    const col=typeColor(ent.entity_type);
    const isSel = sel && sel.node_id===ent.node_id;
    const r = 16 + (ent.weight||1)*3;

    // Floor ring
    const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('cx',p.x); ring.setAttribute('cy',p.y); ring.setAttribute('r',r+5);
    ring.setAttribute('fill','none');
    ring.setAttribute('stroke',(ent.floor_level||0)===0 ? '#ffffff18' : '#aa88ff88');
    ring.setAttribute('stroke-width','2');
    svg.appendChild(ring);

    // Glow filter for selected
    if(isSel) {
      const glow=document.createElementNS('http://www.w3.org/2000/svg','circle');
      glow.setAttribute('cx',p.x); glow.setAttribute('cy',p.y); glow.setAttribute('r',r+8);
      glow.setAttribute('fill',col+'22'); glow.setAttribute('stroke',col+'66');
      glow.setAttribute('stroke-width','4');
      svg.appendChild(glow);
    }

    // Main circle
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',p.x); circle.setAttribute('cy',p.y); circle.setAttribute('r',r);
    circle.setAttribute('fill',col+'25'); circle.setAttribute('stroke',col+(isSel?'ff':'aa'));
    circle.setAttribute('stroke-width',isSel?'2.5':'1.8');
    circle.setAttribute('style','cursor:pointer');
    circle.addEventListener('click',()=>selectEntity(ent));
    svg.appendChild(circle);

    // Type initial
    const letter=document.createElementNS('http://www.w3.org/2000/svg','text');
    letter.setAttribute('x',p.x); letter.setAttribute('y',p.y+4);
    letter.setAttribute('fill',col); letter.setAttribute('font-size',Math.max(10,r*0.6));
    letter.setAttribute('font-family','JetBrains Mono,monospace');
    letter.setAttribute('font-weight','bold');
    letter.setAttribute('text-anchor','middle');
    letter.setAttribute('pointer-events','none');
    letter.textContent=(ent.entity_type||'?')[0].toUpperCase();
    svg.appendChild(letter);

    // Name label
    const name=document.createElementNS('http://www.w3.org/2000/svg','text');
    name.setAttribute('x',p.x); name.setAttribute('y',p.y+r+13);
    name.setAttribute('fill',isSel?col:'#b8ccd8');
    name.setAttribute('font-size',isSel?'9.5':'8.5');
    name.setAttribute('font-family','JetBrains Mono,monospace');
    name.setAttribute('font-weight',isSel?'bold':'normal');
    name.setAttribute('text-anchor','middle');
    name.setAttribute('pointer-events','none');
    name.textContent=ent.name;
    svg.appendChild(name);

    // Weight badge
    const badge=document.createElementNS('http://www.w3.org/2000/svg','text');
    badge.setAttribute('x',p.x+r+2); badge.setAttribute('y',p.y-r+4);
    badge.setAttribute('fill','#4a6070'); badge.setAttribute('font-size','7');
    badge.setAttribute('font-family','JetBrains Mono,monospace');
    badge.textContent=`w${(ent.weight||1).toFixed(1)}`;
    svg.appendChild(badge);
  });
}

// ENTITY SELECTION
// ─────────────────────────────────────────────────────────────────────────────
async function selectEntity(ent) {
  STATE.selected_entity = ent;
  // Load info_nodes if not cached
  if (ent && !STATE.info_nodes_cache[ent.node_id]) {
    try {
      const r = await fetch(`${API}/api/info_nodes?entity_id=${ent.node_id}`);
      if (r.ok) STATE.info_nodes_cache[ent.node_id] = await r.json();
    } catch(e) {}
  }
  // Load full entity detail (includes runtime_embedding, audio_ptr) if not yet loaded
  if (ent && ent.runtime_embedding === undefined) {
    try {
      const r = await fetch(`${API}/api/entities`);
      if (r.ok) {
        const all = await r.json();
        const full = all.find(x => x.node_id === ent.node_id);
        if (full) {
          // Merge extra fields into the selected entity
          Object.assign(ent, full);
          STATE.selected_entity = ent;
          // Also update in main entities array
          const idx = STATE.entities.findIndex(x => x.node_id === ent.node_id);
          if (idx >= 0) STATE.entities[idx] = ent;
        }
      }
    } catch(e) {}
  }
  drawMap();
  drawGraph();
  if (STATE.active_tab === 'entities') {
    renderSidebar();
  } else {
    switchTab('detail');
  }
}

function switchTab(tab) {
  STATE.active_tab = tab;
  document.querySelectorAll('.stab').forEach((b,i)=>{
    const tabs=['entities','raw','detail','log'];
    b.classList.toggle('active', tabs[i]===tab);
  });
  renderSidebar();
}

function renderSidebar() {
  const el = document.getElementById('sidebar-content');
  switch(STATE.active_tab) {
    case 'entities': el.innerHTML = renderEntitiesTab(); break;
    case 'raw':      el.innerHTML = renderRawTab();      break;
    case 'detail':   el.innerHTML = renderDetailTab();   break;
    case 'log':      el.innerHTML = renderLogTab();      break;
  }
}

function renderEntitiesTab() {
  if (!STATE.entities.length) return `<div class="empty">No entities in database.<br>Run demo.py to seed data.</div>`;
  const sel = STATE.selected_entity;
  return STATE.entities.map(e => {
    const col = typeColor(e.entity_type);
    const isSel = sel && sel.node_id===e.node_id;
    const words = (e.top_words||[]).slice(0,4).join(', ') || '—';
    return `<div class="entity-card ${isSel?'selected':''}" onclick="selectEntityById('${e.node_id}')">
      <div class="entity-name" style="color:${col}">${e.name}</div>
      <div class="entity-meta">
        <span style="color:${col}88">${e.entity_type||'?'}</span>
        <span>fl=${e.floor_level||0}</span>
        <span>(${(e.x||0).toFixed(1)},${(e.y||0).toFixed(1)},${(e.z||0).toFixed(1)})</span>
        <span style="color:var(--textdim)">w=${(e.weight||1).toFixed(2)}</span>
        ${e.info_count>0?`<span style="color:var(--acc)">ℹ${e.info_count}</span>`:''}
      </div>
      <div style="margin-top:4px;font-size:8px;color:var(--textdim)">${words}</div>
      ${e.summary?`<div style="font-size:9px;color:var(--text);margin-top:3px">${e.summary}</div>`:''}
    </div>`;
  }).join('');
}

function renderRawTab() {
  if (!STATE.raw_nodes.length) return `<div class="empty">No raw temporal nodes.<br>Call session.add_raw_node() to add sensor data.</div>`;
  const pending = STATE.raw_nodes.filter(r=>!r.processed).length;
  const processed = STATE.raw_nodes.filter(r=>r.processed).length;
  let html = `<div style="display:flex;gap:10px;margin-bottom:10px;font-size:9px">
    <span style="color:var(--warn)">⧖ PENDING: ${pending}</span>
    <span style="color:var(--textdim)">✓ PROCESSED: ${processed}</span>
  </div>`;
  html += STATE.raw_nodes.map(r => {
    const col = rawColor(r.data_type);
    const ago = r.captured_at ? Math.round((Date.now()-new Date(r.captured_at).getTime())/1000) : '?';
    const pos = r.x!=null ? `(${(r.x||0).toFixed(1)},${(r.y||0).toFixed(1)}) fl=${r.floor_level||0}` : '';
    let preview = r.raw_text||'';
    if (!preview && r.raw_json) {
      try { preview = JSON.stringify(JSON.parse(r.raw_json)).slice(0,100); } catch(e) { preview = String(r.raw_json).slice(0,100); }
    }
    return `<div class="raw-card" style="border-left-color:${col};background:${col}08;opacity:${r.processed?0.45:1}">
      <div class="raw-type" style="color:${col}">${r.data_type.replace(/_/g,' ').toUpperCase()} ${r.processed?'<span style="color:var(--acc3)">✓</span>':'<span style="color:var(--warn)">⧖</span>'}</div>
      <div class="raw-text">${preview.slice(0,150)}${preview.length>150?'…':''}</div>
      <div class="raw-meta">${ago}s ago ${pos} ${r.session_id?'· s:'+r.session_id.slice(0,8):''}</div>
    </div>`;
  }).join('');
  return html;
}

  const entEdges = STATE.edges.filter(ed=>ed.node_id_1===e.node_id||ed.node_id_2===e.node_id);

    <div class="detail-section">
      <div class="detail-label">POSITION &amp; ORIENTATION</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:4px">
        ${[['X',e.x,'m E'],['Y',e.y,'m N'],['Z',e.z,'m Up']].map(([l,v,u])=>`
          <div style="background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:4px 6px">
            <div style="font-size:7px;color:var(--textdim)">${l}</div>
            <div style="font-size:11px;color:var(--acc);font-weight:bold">${(v||0).toFixed(2)}</div>
            <div style="font-size:7px;color:var(--textdim)">${u}</div>
          </div>`).join('')}
      </div>
      ${e.facing_deg!=null?`<div style="font-size:9px;color:var(--text);margin-bottom:2px">
        Heading: <span style="color:var(--acc)">${e.facing_deg.toFixed(1)}°</span>
        &nbsp; Pitch: <span style="color:var(--acc)">${(e.pitch_deg||0).toFixed(1)}°</span>
      </div>`:''}
      ${e.bbox_dx?`<div style="font-size:9px;color:var(--textdim)">
        BBox: ${(e.bbox_dx*2).toFixed(2)}×${(e.bbox_dy*2).toFixed(2)}×${(e.bbox_dz*2).toFixed(2)} m
      </div>`:''}
      <div style="font-size:8px;color:var(--textdim);margin-top:3px">
        node_id: ${e.node_id.slice(0,18)}…
      </div>
    </div>`;

  // ── Tags + crucial words ──────────────────────────────────────────────────
  const tagsHtml = `
    <div class="detail-section">
      <div class="detail-label">TAGS &amp; KEYWORDS</div>
      <div style="margin-bottom:4px">
        ${(e.tags||[]).map(t=>`<span class="tag" style="color:${col};background:${col}15;border-color:${col}33">${t}</span>`).join('')
          || '<span style="color:var(--textdim);font-size:9px">no tags</span>'}
      </div>
      <div>
        ${(e.top_words||[]).map(w=>`<span class="tag" style="color:var(--acc4);background:var(--acc4)15;border-color:var(--acc4)33">${w}</span>`).join('')
          || '<span style="color:var(--textdim);font-size:9px">no keywords</span>'}
      </div>
    </div>`;

  // ── Runtime embedding ──────────────────────────────────────────────────────
  let embHtml = '';
  if (e.runtime_embedding) {
    let emb = e.runtime_embedding;
    if (typeof emb === 'string') {
      try { emb = JSON.parse(emb); } catch(_) { emb = null; }
    }
    if (Array.isArray(emb) && emb.length) {
      const dim = emb.length;
      const norm = Math.sqrt(emb.reduce((s,v)=>s+v*v,0));
      // Mini sparkline of first 32 values
      const preview = emb.slice(0,32);
      const mn = Math.min(...preview), mx = Math.max(...preview), rng = mx-mn||1;
      const bars = preview.map(v=>{
        const h = Math.round(((v-mn)/rng)*20);
        return `<span style="display:inline-block;width:5px;height:${Math.max(1,h)}px;
                  background:var(--acc4);margin-right:1px;vertical-align:bottom"></span>`;
      }).join('');
      embHtml = `
        <div class="detail-section">
          <div class="detail-label">RUNTIME EMBEDDING  <span style="color:var(--textdim)">vec(${dim})</span></div>
          <div style="line-height:24px;margin-bottom:4px">${bars}</div>
          <div style="font-size:8px;color:var(--textdim)">
            dim=${dim} &nbsp; L2-norm=${norm.toFixed(4)}
            &nbsp; min=${mn.toFixed(3)} &nbsp; max=${mx.toFixed(3)}
          </div>
        </div>`;
    }
  }

  // ── Media ─────────────────────────────────────────────────────────────────
  let mediaHtml = '';
  const hasMedia = (e.image_ptrs&&e.image_ptrs.length) || e.audio_ptr || e.video_ptr;
  if (hasMedia) {
    const imgs = (e.image_ptrs||[]).map(p=>{
      // If it's a data URI we render it; otherwise show ref string
      const isData = p.startsWith('data:');
      return isData
        ? `<img src="${p}" style="max-width:100%;border-radius:4px;margin-bottom:4px;border:1px solid var(--border)">`
        : `<div style="font-size:9px;color:var(--acc);background:var(--panel2);
                       padding:3px 6px;border-radius:3px;margin-bottom:3px">📷 ${p}</div>`;
    }).join('');
    const audHtml = e.audio_ptr
      ? `<div style="font-size:9px;color:var(--acc2);background:var(--panel2);
                     padding:3px 6px;border-radius:3px;margin-bottom:3px">🎤 ${e.audio_ptr}</div>` : '';
    const vidHtml = e.video_ptr
      ? `<div style="font-size:9px;color:var(--acc3);background:var(--panel2);
                     padding:3px 6px;border-radius:3px">🎥 ${e.video_ptr}</div>` : '';
    mediaHtml = `
      <div class="detail-section">
        <div class="detail-label">MEDIA</div>
        ${imgs}${audHtml}${vidHtml}
      </div>`;
  }

  // ── Edges ────────────────────────────────────────────────────────────────
  const edgesHtml = entEdges.length ? entEdges.map(ed => {
    const otherId = ed.node_id_1===e.node_id ? ed.node_id_2 : ed.node_id_1;
    const other   = STATE.entities.find(x=>x.node_id===otherId);
    const ecol    = relColor(ed.rel_type);
    return `<div class="edge-row">
      <span class="edge-rel" style="background:${ecol}22;color:${ecol};border:1px solid ${ecol}44">${ed.rel_type}</span>
      <span class="edge-target" style="flex:1">${other?other.name:otherId.slice(0,8)+'…'}</span>
      <span class="edge-name" style="color:var(--textdim)">${ed.rel_name||''}</span>
    </div>`;
  }).join('') : '<div style="color:var(--textdim);font-size:9px">No edges</div>';

  // ── Info nodes (full knowledge) ───────────────────────────────────────────
  const infoHtml = infos.length ? infos.map((inf,i) => `
    <div class="info-card" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
        <span style="font-size:7px;color:var(--textdim);background:var(--muted);
                     padding:1px 5px;border-radius:2px">#${i+1}</span>
        <div style="display:flex;gap:4px;flex-wrap:wrap;flex:1">
          ${(inf.crucial_words||[]).map(w=>`<span class="tag">${w}</span>`).join('')}
        </div>
        <span style="font-size:8px;color:var(--textdim);flex-shrink:0">w=${(inf.weight||1).toFixed(2)}</span>
      </div>
      ${inf.full_data?`
        <div style="font-size:9px;color:var(--text);line-height:1.7;
                    background:var(--panel2);border-radius:3px;padding:6px 8px;
                    white-space:pre-wrap;word-break:break-word;
                    border-left:2px solid ${col}55">
          ${inf.full_data}
        </div>`:''}
      <div style="display:flex;gap:8px;margin-top:4px;font-size:8px;color:var(--textdim)">
        ${inf.image_ptr?`<span style="color:var(--acc)">📷 ${inf.image_ptr}</span>`:''}
        ${inf.video_ptr?`<span style="color:var(--acc2)">🎥 ${inf.video_ptr}</span>`:''}
        ${inf.audio_ptr?`<span style="color:var(--acc3)">🎤 ${inf.audio_ptr}</span>`:''}
        <span style="margin-left:auto">${inf.node_id?inf.node_id.slice(0,8)+'…':''}</span>
      </div>
    </div>`).join('')
    : '<div style="color:var(--textdim);font-size:9px">No info nodes stored yet</div>';

  return headerHtml + summaryHtml + posHtml + tagsHtml + embHtml + mediaHtml + `
    <div class="detail-section">
      <div class="detail-label">RELATIONSHIPS (${entEdges.length})</div>
      ${edgesHtml}
    </div>
    <div class="detail-section">
      <div class="detail-label">KNOWLEDGE  (${infos.length} info nodes)</div>
      ${infoHtml}
    </div>`;
}

function renderLogTab() {
  let html = '';

  // Consolidation log
  html += `<div class="detail-label" style="margin-bottom:6px">CONSOLIDATION HISTORY</div>`;
  if (!STATE.consolidation_log.length) {
    html += `<div class="empty">No consolidation runs yet.<br>Call flush_and_consolidate() to process raw nodes.</div>`;
  } else {
    html += STATE.consolidation_log.map(c => {
      const scol = c.status==='done'?'var(--acc3)':c.status==='failed'?'var(--red)':'var(--warn)';
      const dur  = c.finished_at&&c.started_at ?
        ((new Date(c.finished_at)-new Date(c.started_at))/1000).toFixed(1)+'s' : '…';
      return `<div class="clog-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span class="clog-status-${c.status}" style="font-size:9px">${c.status.toUpperCase()}</span>
          <span style="color:var(--textdim);font-size:8px">${c.started_at?new Date(c.started_at).toLocaleTimeString():''} (${dur})</span>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:8px;color:var(--textdim);margin-bottom:4px">
          <span style="color:var(--text)">raw: ${c.raw_nodes_processed||0}</span>
          <span style="color:var(--acc)">ent+: ${c.entities_created||0}</span>
          <span style="color:var(--acc2)">edge+: ${c.edges_created||0}</span>
          <span style="color:var(--acc3)">info+: ${c.info_nodes_created||0}</span>
          <span>calls: ${c.llm_calls||0}</span>
          <span>${c.llm_model||''}</span>
        </div>
        ${c.summary_text?`<div style="font-size:9px;color:var(--text);line-height:1.5">${c.summary_text.slice(0,200)}</div>`:''}
      </div>`;
    }).join('');
  }

  // Recent interactions
  html += `<div class="detail-label" style="margin:12px 0 6px">RECENT INTERACTIONS (${STATE.interactions.length})</div>`;
  if (!STATE.interactions.length) {
    html += `<div style="color:var(--textdim);font-size:9px">No interactions recorded yet.</div>`;
  } else {
    html += STATE.interactions.slice(0,20).map(i => `
      <div style="display:flex;gap:8px;align-items:baseline;margin-bottom:4px;font-size:9px">
        <span style="color:var(--textdim);flex-shrink:0">${i.interaction_ts?new Date(i.interaction_ts).toLocaleTimeString():''}</span>
        <span style="color:var(--text)">${i.entity_name||'?'}</span>
        <span style="color:var(--textdim)">${i.x!=null?`(${(i.x||0).toFixed(1)},${(i.y||0).toFixed(1)})`:''} fl=${i.floor_level||0}</span>
        <span style="color:var(--textdim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.notes||''}</span>
      </div>`).join('');
  }

  return html;
}

function selectEntityById(id) {
  const ent = STATE.entities.find(e=>e.node_id===id);
  if (ent) selectEntity(ent);
}

// ─────────────────────────────────────────────────────────────────────────────
// MASTER RENDER
// ─────────────────────────────────────────────────────────────────────────────
function renderAll() {
  renderHeader();
  renderFloorTabs();
  renderLegend();
  layoutGraph();
  drawMap();
  drawGraph();
  renderSidebar();
}

// ─────────────────────────────────────────────────────────────────────────────
// RESIZE HANDLING
// ─────────────────────────────────────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    // Invalidate graph layout positions so they re-run on new size
    Object.keys(graphLayout).forEach(id => {
      const p = graphLayout[id];
      if(p) { p.vx=0; p.vy=0; }
    });
    renderAll();
  }, 150);
});

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
fetchAll();
setInterval(fetchAll, POLL_MS);
</script>
</body>
</html>
